services:
  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/data
    networks:
      - internal
    restart: always

  ingestion:
    build: ./ingestion
    volumes:
      - ./documents:/documents
    env_file: .env
    networks:
      - internal

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    env_file: .env
    networks:
      - internal
    depends_on:
      - chromadb
    restart: always

networks:
  internal:
    driver: bridge

volumes:
  chroma_data:
